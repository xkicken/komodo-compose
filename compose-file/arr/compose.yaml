---
services:

  # ─────────────────────────────────────────────
  # Gluetun — VPN gateway
  # Pinned to v3.39.0 — v3.40+ has ProtonVPN issues
  # ─────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun:v3.39.0
    container_name: gluetun
    restart: always
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8778:8888/tcp  # HTTP proxy
      - 8001:8000/tcp  # Gluetun control server
      - 8080:8080      # qBittorrent WebUI
      - 6881:6881      # qBittorrent torrent
      - 6881:6881/udp  # qBittorrent torrent
      - 9696:9696      # Prowlarr WebUI
    volumes:
      - ${APPDATA}/gluetun/:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/forwarded_port
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      - VPN_PORT_FORWARDING_DOWN_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      - WIREGUARD_PUBLIC_KEY=${WG_PUBLIC_KEY}
      - WIREGUARD_PRIVATE_KEY=${WG_PRIVATE_KEY}
      - WIREGUARD_ENDPOINT_IP=${WG_ENDPOINT_IP}
      - WIREGUARD_ADDRESSES=${WG_ADDRESSES}
      - DNS_ADDRESS=${DNS_ADDRESS}
      - TZ=${TZ:-UTC}
      - UPDATER_PERIOD=24h
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS:-192.168.1.0/24,10.0.0.0/16,172.21.0.0/16}
      - DOT_PROVIDERS=cloudflare,google
      - PUBLICIP_API=ip2location
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # qBittorrent — torrent client (VPN network only)
  # ─────────────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    container_name: gt-qb
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
    volumes:
      - ${APPDATA}/qbit/config:/config
      - ${MEDIA}:/media
      - ${PRIVATE}/download:/privatedownload
    restart: unless-stopped


  # ─────────────────────────────────────────────
  # Prowlarr — indexer manager (VPN network only)
  # ─────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APPDATA}/prowlarr/config:/config
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Sonarr — TV show manager
  # ─────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APPDATA}/sonarr/config:/config
      - ${MEDIA}:/media
      - ${PRIVATE}:/private
    ports:
      - 8989:8989
    depends_on:
      - prowlarr
      - qbittorrent
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Radarr — movie manager
  # ─────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APPDATA}/radarr/config:/config
      - ${MEDIA}:/media
      - ${PRIVATE}:/private
    ports:
      - 7878:7878
    depends_on:
      - prowlarr
      - qbittorrent
    restart: unless-stopped