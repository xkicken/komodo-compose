---
services:

  # ─────────────────────────────────────────────
  # Gluetun — VPN gateway
  # Pinned to v3.39.0 — v3.40+ has ProtonVPN issues
  # ─────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: always
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8778:8888/tcp  # HTTP proxy
      - 8001:8000/tcp  # Gluetun control server
      - 8080:8080      # qBittorrent WebUI
      - 6881:6881      # qBittorrent torrent
      - 6881:6881/udp  # qBittorrent torrent
    volumes:
      - ${APPDATA}/gluetun/:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - VPN_PORT_FORWARDING=on
      - PORT_FORWARD_ONLY=true
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/forwarded_port
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- --retry-connrefused --post-data "json={\"listen_port\":{{PORTS}}}" http://127.0.0.1:8080/api/v2/app/setPreferences 2>&1'
      - WIREGUARD_PRIVATE_KEY=${WG_PRIVATE_KEY}
      - SERVER_COUNTRIES=New Zealand
      - TZ=${TZ:-UTC}
      - UPDATER_PERIOD=24h
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS:-192.168.1.0/24,10.0.0.0/16,172.21.0.0/16}
      - PUBLICIP_API=ip2location
      - LOG_LEVEL=info
      - SERVER_FEATURES=p2p
      - OPENVPN_USER=${PROTON_OPENVPN_USER}
      - OPENVPN_PASSWORD=${PROTON_OPENVPN_PASSWORD}
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # qBittorrent — torrent client (VPN network only)
  # ─────────────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:libtorrentv1
    container_name: gt-qb
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
    volumes:
      - ${APPDATA}/qbit/config:/config
      - ${MEDIA}:/media
      - ${PRIVATE}/download:/privatedownload
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Sonarr — TV show manager
  # ─────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APPDATA}/sonarr/config:/config
      - ${MEDIA}:/media
      - ${PRIVATE}:/private
    ports:
      - 8989:8989
    depends_on:
      - qbittorrent
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Radarr — movie manager
  # ─────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APPDATA}/radarr/config:/config
      - ${MEDIA}:/media
      - ${PRIVATE}:/private
    ports:
      - 7878:7878
    depends_on:
      - qbittorrent
    restart: unless-stopped