---
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: always
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8778:8888/tcp  # HTTP proxy
      - 8001:8000/tcp  # Gluetun control server
      - 8080:8080      # qBittorrent WebUI
      - 6881:6881      # qBittorrent torrent
      - 6881:6881/udp  # qBittorrent torrent
    volumes:
      - ${APPDATA}/gluetun/:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WG_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${WG_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${WG_ADDRESSES}
      - SERVER_COUNTRIES=New Zealand
      - FIREWALL_VPN_INPUT_PORTS=${AIRVPN_FORWARDED_PORT}
      - TZ=${TZ:-UTC}
      - UPDATER_PERIOD=24h
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS:-192.168.1.0/24,10.0.0.0/16,172.21.0.0/16}
      - PUBLICIP_API=ip2location
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # qBittorrent — torrent client (VPN network only)
  # ─────────────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:libtorrentv1
    container_name: gt-qb
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
    volumes:
      - ${APPDATA}/qbit/config:/config
      - ${MEDIA}:/media
      - ${PRIVATE}/download:/privatedownload
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Sonarr — TV show manager
  # ─────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APPDATA}/sonarr/config:/config
      - ${MEDIA}:/media
      - ${PRIVATE}:/private
    ports:
      - 8989:8989
    depends_on:
      - qbittorrent
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Radarr — movie manager
  # ─────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APPDATA}/radarr/config:/config
      - ${MEDIA}:/media
      - ${PRIVATE}:/private
    ports:
      - 7878:7878
    depends_on:
      - qbittorrent
    restart: unless-stopped